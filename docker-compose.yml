services:
  backend:
    build:
      context: ./backend
    container_name: medical-intelligence-backend
    env_file:
      - ./.env
    environment:
      MIS_APP_NAME: ${MIS_APP_NAME:-Medical Intelligence System API}
      MIS_APP_VERSION: ${MIS_APP_VERSION:-0.1.0}
      MIS_APP_ENV: ${MIS_APP_ENV:-development}
      MIS_APP_HOST: ${MIS_APP_HOST:-0.0.0.0}
      MIS_APP_PORT: ${MIS_APP_PORT:-8000}
      MIS_LOG_LEVEL: ${MIS_LOG_LEVEL:-INFO}
      MIS_CORS_ORIGINS: ${MIS_CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173"]}
      MIS_DATABASE_URL: ${MIS_DATABASE_URL:-sqlite:///./data/medical_intelligence.db}
      MIS_REPORT_OUTPUT_DIR: ${MIS_REPORT_OUTPUT_DIR:-./reports}
      MIS_LLM_PROVIDER: ${MIS_LLM_PROVIDER:-openrouter}
      MIS_LLM_API_KEY: ${MIS_LLM_API_KEY:-}
      MIS_LLM_DEFAULT_MODEL: ${MIS_LLM_DEFAULT_MODEL:-}
      MIS_LLM_REQUEST_TIMEOUT_SECONDS: ${MIS_LLM_REQUEST_TIMEOUT_SECONDS:-60}
      MIS_LLM_ENABLE_RESPONSE_HEALING: ${MIS_LLM_ENABLE_RESPONSE_HEALING:-true}
      MIS_LLM_OPENROUTER_BASE_URL: ${MIS_LLM_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      MIS_LLM_OPENROUTER_SITE_URL: ${MIS_LLM_OPENROUTER_SITE_URL:-}
      MIS_LLM_OPENROUTER_APP_TITLE: ${MIS_LLM_OPENROUTER_APP_TITLE:-Medical Intelligence System}
      MIS_FETCH_CLINICALTRIALS_MAX_RECORDS: ${MIS_FETCH_CLINICALTRIALS_MAX_RECORDS:-100}
      MIS_FETCH_PUBMED_MAX_RECORDS: ${MIS_FETCH_PUBMED_MAX_RECORDS:-100}
      MIS_FETCH_QUERY_INTERVAL_SECONDS: ${MIS_FETCH_QUERY_INTERVAL_SECONDS:-0.5}
      MIS_ANALYSIS_LLM_ENRICHMENT_FULL_SCAN: ${MIS_ANALYSIS_LLM_ENRICHMENT_FULL_SCAN:-true}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: medical-intelligence-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
